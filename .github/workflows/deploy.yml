name: Inject API Key & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Encoded API Key
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ENCODED=$(echo -n "$API_KEY" | base64 | tr -d '\n')
          sed -i "s|ANTHROPIC_KEY_PLACEHOLDER|${ENCODED}|g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: true
          exclude_assets: '.github'
